name: KM Playwright Testson:  push:    branches: [ main, develop, 'feature/**' ]  pull_request:    branches: [ main, develop ]  workflow_dispatch:  schedule:    - cron: '0 2 * * *'hjobs:  test:    name: "${{ matrix.project }}"    runs-on: ubuntu-latest    timeout-minutes: 30    strategy:      fail-fast: false      matrix:        project: [frontend-chromium, backend-chromium, integration]    steps:      - uses: actions/checkout@v4      - uses: actions/setup-node@v4        with:          node-version: '20'          cache: 'npm'      - run: npm install      - run: npx playwright install --with-deps chromium firefox      - name: Run Playwright tests        run: npx playwright test --project=${{ matrix.project }}        env:          BASE_URL:      ${{ secrets.BASE_URL }}          ADMIN_URL:     ${{ secrets.ADMIN_URL }}          EDITOR_USER:   ${{ secrets.EDITOR_USER }}          EDITOR_PASS:   ${{ secrets.EDITOR_PASS }}
